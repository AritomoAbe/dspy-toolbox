[mypy]
python_version = 3.12
mypy_path = src
explicit_package_bases = True
check_untyped_defs = True
ignore_missing_imports = True
plugins = returns.contrib.mypy.returns_plugin, pydantic.mypy

# Untyped definitions and calls
disallow_untyped_calls = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
disallow_untyped_decorators = True

# None and Optional handling
no_implicit_optional = True
strict_optional = True

# Configuring error messages
show_error_context = True
show_column_numbers = True
show_error_codes = True
pretty = True

# Disallow dynamic typing :: allow dynamic typing for now
disallow_any_unimported = True
disallow_any_generics = True
disallow_subclassing_any = True

# Configuring warnings
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_return_any = True
warn_unreachable = True

# Miscellaneous strictness flags
strict_equality = True
implicit_reexport = False

[mypy-proc.base.dspy_llm]
disallow_any_unimported = False
disallow_subclassing_any = False

[mypy-proc.demos.meeting_invite.meeting_invite_dataset]
disallow_any_unimported = False
disallow_any_generics = False

[mypy-proc.demos.meeting_invite.dspy_signatures]
disallow_any_unimported = False
disallow_subclassing_any = False

[mypy-proc.demos.meeting_invite.meeting_invite_extractor_llm]
disallow_any_unimported = False
disallow_any_generics = False

[mypy-proc.demos.meeting_invite.meeting_invite_score_extractor]
disallow_any_unimported = False

[mypy-proc.pipeline.dataset.base_dataset]
disallow_any_unimported = False

[mypy-proc.pipeline.output_result_auditor.score_extractor]
disallow_any_unimported = False

[mypy-proc.pipeline.output_result_auditor.monte_carlo_estimation]
disallow_any_unimported = False

[flake8]
max-line-length = 120
ignore = D100,D101,D102,D103,D104,D107,D105,Q000,WPS506,WPS306,WPS420,WPS602,WPS211,WPS604,WPS301,WPS111,WPS305,WPS114,D106,WPS237,WPS201,C812,WPS210,WPS431,WPS115,WPS110,W293,WPS100,WPS122,WPS120
per-file-ignores =
    src/proc/pipeline/training_set_auditor/models.py: WPS202
    src/proc/demos/meeting_invite/models.py: WPS202

[isort]
skip_glob = build,dist,docker,docs,frontend,var
line_length = 120
known_foundation = foundation
known_first_party = base
sections = FUTURE,STDLIB,THIRDPARTY,FOUNDATION,FIRSTPARTY,CURRENT,LOCALFOLDER
multi_line_output = 3
indent = 4
force_grid_wrap = False
default_section = THIRDPARTY
combine_as_imports = True
include_trailing_comma = True
force_sort_within_sections = True
use_parentheses = True
known_current = this_is_just_to_silence_warning_packages_have_that_overriden

[coverage:run]
omit = *_test.py, *__init__.py, *report*, *setup.py, src/tests/*, src/proc/base/dspy_llm.py
