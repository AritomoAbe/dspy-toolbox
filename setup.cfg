[isort]
skip_glob = build,dist,docker,docs,frontend,var
line_length = 120
known_foundation = foundation
known_first_party = base
sections = FUTURE,STDLIB,THIRDPARTY,FOUNDATION,FIRSTPARTY,CURRENT,LOCALFOLDER
multi_line_output = 3
indent = 4
force_grid_wrap = False
default_section = THIRDPARTY
combine_as_imports = True
include_trailing_comma = True
force_sort_within_sections = True
use_parentheses = True
known_current = this_is_just_to_silence_warning_packages_have_that_overriden

[coverage:run]
omit = *_test.py, *__init__.py, *report*, *setup.py, src/tests/*, src/proc/base/dspy_llm.py
