[flake8]
max-line-length = 120
ignore = WPS211,WPS301,WPS111,WPS114,WPS237,WPS201,WPS210,WPS115,WPS110,WPS100,WPS102
per-file-ignores =
    src/proc/pipeline/training_set_auditor/models.py: WPS202
    src/proc/demos/meeting_invite/models.py: WPS202
    src/proc/pipeline/output_result_auditor/models.py: WPS202
    src/proc/pipeline/llm_prompt_usage_attribution/_hf_attribution_base.py: WPS229,WPS231,WPS420
    src/proc/pipeline/llm_prompt_usage_attribution/token_attribution_auditor.py: E402,WPS212,WPS213,WPS214,WPS221,WPS231,WPS232,WPS420,WPS430,WPS478,WPS505
    src/proc/pipeline/llm_prompt_usage_attribution/prompt_attribution_node.py: E402,WPS214,WPS213,WPS221,WPS231,WPS430,WPS478
    src/proc/pipeline/llm_prompt_usage_attribution/models.py: WPS202
    src/proc/demos/meeting_invite/tuning/abe_gpt/*.py: WPS202,WPS213,WPS220,WPS221,WPS231,WPS232,WPS338,WPS347,WPS363,WPS430,WPS458,WPS463,WPS478
    src/proc/pipeline/lora_fine_tuning/lora_fine_tuning_node.py: WPS214,WPS213,WPS231
    src/proc/pipeline/lora_fine_tuning/models.py: WPS202

[isort]
skip_glob = build,dist,docker,docs,frontend,var
line_length = 120
known_foundation = foundation
known_first_party = base
sections = FUTURE,STDLIB,THIRDPARTY,FOUNDATION,FIRSTPARTY,CURRENT,LOCALFOLDER
multi_line_output = 3
indent = 4
force_grid_wrap = False
default_section = THIRDPARTY
combine_as_imports = True
include_trailing_comma = True
force_sort_within_sections = True
use_parentheses = True
known_current = this_is_just_to_silence_warning_packages_have_that_overriden

[coverage:run]
omit =
    *_test.py
    *__init__.py
    *report*
    *setup.py
    src/tests/*
    src/proc/base/dspy_llm.py
    src/proc/pipeline/llm_prompt_usage_attribution/token_attribution_auditor.py
    src/proc/pipeline/llm_prompt_usage_attribution/_hf_attribution_base.py
    src/proc/pipeline/llm_prompt_usage_attribution/prompt_attribution_node.py
    src/proc/pipeline/lora_fine_tuning/lora_fine_tuning_node.py
